services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - frontend_build:/srv/frontend:ro
    # Needed so Caddy's reverse_proxy can reach LiveKit, which runs with
    # network_mode: host and is NOT on the Docker bridge network.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend-build
      - meeting-api

  frontend-build:
    build: ./frontend
    volumes:
      - frontend_build:/output
    # One-shot container: copies the built SPA into the shared volume, then exits.
    command: ["sh", "-c", "rm -rf /output/* && cp -r /app/dist/* /output/"]

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    # Host networking is the pragmatic way to expose 50000-60000/udp without
    # publishing thousands of -p mappings. Signaling is still reverse-proxied
    # through Caddy at /rtc so clients only need 443.
    network_mode: host
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    environment:
      # Keys are interpolated by Compose from .env at parse time. LiveKit reads
      # LIVEKIT_KEYS directly (format: "<api_key>: <api_secret>").
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      # Webhook config also via env so Compose can interpolate values.
      LIVEKIT_WEBHOOK_API_KEY: "${LIVEKIT_WEBHOOK_KEY}"
      # LiveKit is on host networking; meeting-api publishes 127.0.0.1:8080.
      LIVEKIT_WEBHOOK_URLS: "http://127.0.0.1:8080/api/v1/webhooks/livekit"
    depends_on:
      - redis

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      # EGRESS_CONFIG_BODY takes the full YAML config as a string — Compose
      # interpolates ${LIVEKIT_*} values from .env at parse time, unlike
      # file mounts.
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://host.docker.internal:7880
        redis:
          address: redis:6379
        insecure: true
        storage:
          local:
            enabled: true
            path: /out
    volumes:
      - /var/lib/meet/recordings:/out
    # Needed so egress (bridge network) can reach livekit (host network).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - livekit
      - redis
    cap_add:
      - SYS_ADMIN

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Published on 127.0.0.1 so livekit (host network) can reach it.
    # meeting-api (bridge network) still uses "redis:6379" via Docker DNS.
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  meeting-api:
    build: ./meeting-api
    restart: unless-stopped
    env_file: .env
    # Published on 127.0.0.1 so LiveKit (host network) can POST webhooks
    # to http://127.0.0.1:8080/api/v1/webhooks/livekit.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/lib/meet:/var/lib/meet
    # Needed so meeting-api can call LiveKit's server API (host network)
    # via host.docker.internal:7880 for moderator + egress operations.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

volumes:
  caddy_data:
  caddy_config:
  frontend_build:
  redis_data:
