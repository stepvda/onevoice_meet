services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - frontend_build:/srv/frontend:ro
    # Needed so Caddy's reverse_proxy can reach LiveKit, which runs with
    # network_mode: host and is NOT on the Docker bridge network.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend-build
      - meeting-api

  frontend-build:
    build: ./frontend
    volumes:
      - frontend_build:/output
    # One-shot container: copies the built SPA into the shared volume, then exits.
    command: ["sh", "-c", "rm -rf /output/* && cp -r /app/dist/* /output/"]

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    # Host networking is the pragmatic way to expose 50000-60000/udp without
    # publishing thousands of -p mappings. Signaling is still reverse-proxied
    # through Caddy at /rtc so clients only need 443.
    network_mode: host
    # Template-substitute the API key/secret/webhook key at container start.
    # We can't use ${VAR} placeholders in the YAML directly (Compose doesn't
    # interpolate mounted files) and viper doesn't auto-split env vars into
    # slice fields like webhook.urls — so the YAML is the only correct path.
    entrypoint:
      - sh
      - -c
      - 'sed -e "s|__API_KEY__|$$LIVEKIT_API_KEY|g" -e "s|__API_SECRET__|$$LIVEKIT_API_SECRET|g" -e "s|__WEBHOOK_KEY__|$$LIVEKIT_WEBHOOK_KEY|g" /etc/livekit.yaml.tpl > /tmp/livekit.yaml; exec /livekit-server --config /tmp/livekit.yaml'
    volumes:
      - ./livekit/livekit.yaml.tpl:/etc/livekit.yaml.tpl:ro
    env_file: .env
    depends_on:
      - redis

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      # EGRESS_CONFIG_BODY takes the full YAML config as a string — Compose
      # interpolates ${LIVEKIT_*} values from .env at parse time, unlike
      # file mounts.
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://host.docker.internal:7880
        redis:
          address: redis:6379
        insecure: true
        storage:
          local:
            enabled: true
            path: /var/lib/meet/recordings
        # The Hetzner box has 2 vCPUs. LiveKit Egress's default per-job CPU
        # cost is 4.0 for room composite, which makes it refuse to claim any
        # job. Lowering the costs lets it accept; H.264 720p30 + AAC fits in
        # roughly 1 core. Quality may degrade with concurrent recordings on
        # this size box — bump to 4 vCPUs for production-grade recording.
        cpu_cost:
          room_composite_cpu_cost: 1.0
          web_cpu_cost: 1.0
          participant_cpu_cost: 1.0
          track_composite_cpu_cost: 0.5
          track_cpu_cost: 0.5
          audio_only_cpu_cost: 0.25
    # Mount the host's recordings directory at the SAME path inside the
    # container so absolute filepaths set by meeting-api work without
    # translation. The dir on the host must be writable by uid 1001 (egress).
    volumes:
      - /var/lib/meet/recordings:/var/lib/meet/recordings
    # Needed so egress (bridge network) can reach livekit (host network).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - livekit
      - redis
    cap_add:
      - SYS_ADMIN

  ingress:
    image: livekit/ingress:latest
    restart: unless-stopped
    environment:
      # Same config-as-string trick as egress. We only use URL_INPUT (pulls
      # an MP4 from meeting-api via HTTP and republishes it as a participant
      # track for the in-meeting video playback feature) — no RTMP/WHIP
      # ingest exposed externally. CPU costs are tuned for the 2-vCPU box
      # to coexist with one room-composite egress.
      INGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://host.docker.internal:7880
        redis:
          address: redis:6379
        logging:
          level: info
        # RTMP / WHIP ports are unused — we only call URL_INPUT — but the
        # ingress binary listens regardless. Keep them on default ports and
        # don't publish them outside the docker network.
        rtmp_port: 1935
        whip_port: 8080
        http_relay_port: 9090
        # Compete for one of the 2 vCPUs on the box without starving egress.
        # `url_cpu_cost` is clamped to 1.0 minimum by the ingress binary —
        # 0.5 throws "url input requirement too low" on startup. 1.0 means
        # URL_INPUT + one egress saturates the 2 vCPUs but does fit.
        cpu_cost:
          rtmp_cpu_cost: 1.0
          whip_cpu_cost: 1.0
          whip_bypass_transcoding_cpu_cost: 0.5
          url_cpu_cost: 1.0
    # Shared volume so ingress can read playlist files written by meeting-api.
    # Mounted at the same path so absolute file-URLs work without translation.
    volumes:
      - /var/lib/meet:/var/lib/meet
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - livekit
      - redis
    cap_add:
      - SYS_ADMIN

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Published on 127.0.0.1 so livekit (host network) can reach it.
    # meeting-api (bridge network) still uses "redis:6379" via Docker DNS.
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  meeting-api:
    build: ./meeting-api
    restart: unless-stopped
    env_file: .env
    # Published on 127.0.0.1 so LiveKit (host network) can POST webhooks
    # to http://127.0.0.1:8080/api/v1/webhooks/livekit.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/lib/meet:/var/lib/meet
      # File-backed logs: app.log / requests.log / db.log rotate daily,
      # gzip on rotation and survive container restarts. Kept on the host
      # under /var/log/meet/.
      - /var/log/meet:/var/log/meet
    # Needed so meeting-api can call LiveKit's server API (host network)
    # via host.docker.internal:7880 for moderator + egress operations.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  # Headless-Chrome PiP compositor. Listens on internal port 8090;
  # meeting-api calls POST /sessions/<room> when a meeting flips
  # `pip_enabled` on and DELETE /sessions/<room> when it flips off.
  # The page it launches loads the SPA over the public URL and
  # connects to LiveKit via wss://meet.witysk.org/rtc (so the same
  # path participants use). One Chromium per service instance, one
  # page per active room.
  compositor:
    build: ./compositor
    restart: unless-stopped
    environment:
      PUBLIC_URL: "https://meet.witysk.org"
    # Internal-only; meeting-api reaches it via Docker DNS as
    # "compositor:8090". Never exposed to the host.
    expose:
      - "8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - livekit

  # whisper.cpp running locally so completed recordings get transcribed
  # without an external API. Started lazily — meeting-api will keep
  # retrying if this container is still booting when a recording ends.
  whisper:
    build: ./whisper
    restart: unless-stopped
    # Default thread count tuned for the 2-vCPU Hetzner box. Bump on a
    # bigger host by adding `WHISPER_THREADS=N` to .env.
    environment:
      THREADS: "${WHISPER_THREADS:-2}"
    # Internal-only — meeting-api reaches it via Docker DNS as "whisper:8080".
    expose:
      - "8080"

volumes:
  caddy_data:
  caddy_config:
  frontend_build:
  redis_data:
