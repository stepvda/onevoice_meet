<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">meet.witysk.org promo</title>
  <desc id="desc">Promotional graphic for meet.witysk.org showing a six-tile video call grid with a spotlighted presenter, recording indicator, and the headline "Meet on your terms."</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1A2B"/>
      <stop offset="100%" stop-color="#1B2A44"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243653"/>
      <stop offset="100%" stop-color="#1A2942"/>
    </linearGradient>
    <linearGradient id="tileHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E456B"/>
      <stop offset="100%" stop-color="#1F3252"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="c0"><rect x="620"  y="140" width="284" height="298" rx="20"/></clipPath>
    <clipPath id="c1"><rect x="928"  y="140" width="284" height="298" rx="20"/></clipPath>
    <clipPath id="c2"><rect x="1236" y="140" width="284" height="298" rx="20"/></clipPath>
    <clipPath id="c3"><rect x="620"  y="462" width="284" height="298" rx="20"/></clipPath>
    <clipPath id="c4"><rect x="928"  y="462" width="284" height="298" rx="20"/></clipPath>
    <clipPath id="c5"><rect x="1236" y="462" width="284" height="298" rx="20"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="120" r="640" fill="url(#glow)"/>

  <!-- left text -->
  <g font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <!-- wordmark -->
    <g transform="translate(80, 95)">
      <circle cx="20" cy="20" r="20" fill="#F5A623"/>
      <path d="M 12 20 L 18 26 L 28 14" stroke="#0E1A2B" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="56" y="29" font-size="22" font-weight="600" fill="#FFFFFF">witysk · meet</text>
    </g>

    <text x="80" y="320" font-size="84" font-weight="700" fill="#FFFFFF" letter-spacing="-1.5">Meet on your</text>
    <text x="80" y="408" font-size="84" font-weight="700" fill="#FFFFFF" letter-spacing="-1.5">terms.</text>

    <text x="80" y="468" font-size="30" font-weight="500" fill="#FFFFFF" opacity="0.85">Self-hosted video for up to 50.</text>
    <text x="80" y="506" font-size="22" font-weight="400" fill="#FFFFFF" opacity="0.6">Recordings · Virtual backgrounds · 30+ languages</text>

    <!-- URL chip -->
    <g>
      <rect x="80" y="560" width="400" height="72" rx="36" fill="#F5A623"/>
      <text x="280" y="606" font-size="28" font-weight="700" fill="#0E1A2B" text-anchor="middle">meet.witysk.org</text>
    </g>

    <text x="80" y="822" font-size="18" font-weight="500" fill="#FFFFFF" opacity="0.45">Part of TI One Voice · Open · Self-hosted</text>
  </g>

  <!-- ===== GRID ===== -->

  <!-- Tile (0,0) — EN, REC -->
  <g>
    <rect x="620" y="140" width="284" height="298" rx="20" fill="url(#tile)"/>
    <g clip-path="url(#c0)">
      <circle cx="762" cy="280" r="58" fill="#E8C8A8"/>
      <ellipse cx="762" cy="438" rx="120" ry="80" fill="#E8C8A8"/>
    </g>
    <!-- REC pill -->
    <g>
      <rect x="640" y="158" width="78" height="30" rx="15" fill="#0E1A2B" opacity="0.85"/>
      <circle cx="656" cy="173" r="6" fill="#FF3B30">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.3s" repeatCount="indefinite"/>
      </circle>
      <text x="668" y="178" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">REC</text>
    </g>
    <g>
      <rect x="846" y="158" width="42" height="26" rx="13" fill="#0E1A2B" opacity="0.7"/>
      <text x="867" y="176" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">EN</text>
    </g>
    <rect x="620" y="398" width="284" height="40" fill="#000000" opacity="0.3"/>
    <text x="640" y="424" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">Alex</text>
  </g>

  <!-- Tile (1,0) — FR, SPOTLIGHT -->
  <g>
    <rect x="918" y="130" width="304" height="318" rx="24" fill="none" stroke="#F5A623" stroke-width="2" opacity="0.45" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.25;0.6;0.25" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="928" y="140" width="284" height="298" rx="20" fill="url(#tileHi)" stroke="#F5A623" stroke-width="3"/>
    <g clip-path="url(#c1)">
      <circle cx="1070" cy="280" r="58" fill="#C99A78"/>
      <ellipse cx="1070" cy="438" rx="120" ry="80" fill="#C99A78"/>
    </g>
    <g>
      <rect x="948" y="158" width="118" height="30" rx="15" fill="#F5A623"/>
      <text x="1007" y="178" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0E1A2B" text-anchor="middle">PRESENTER</text>
    </g>
    <g>
      <rect x="1154" y="158" width="42" height="26" rx="13" fill="#0E1A2B" opacity="0.7"/>
      <text x="1175" y="176" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">FR</text>
    </g>
    <rect x="928" y="398" width="284" height="40" fill="#000000" opacity="0.3"/>
    <text x="948" y="424" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">Camille</text>
  </g>

  <!-- Tile (2,0) — ES -->
  <g>
    <rect x="1236" y="140" width="284" height="298" rx="20" fill="url(#tile)"/>
    <g clip-path="url(#c2)">
      <circle cx="1378" cy="280" r="58" fill="#A77A5A"/>
      <ellipse cx="1378" cy="438" rx="120" ry="80" fill="#A77A5A"/>
    </g>
    <g>
      <rect x="1462" y="158" width="42" height="26" rx="13" fill="#0E1A2B" opacity="0.7"/>
      <text x="1483" y="176" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">ES</text>
    </g>
    <rect x="1236" y="398" width="284" height="40" fill="#000000" opacity="0.3"/>
    <text x="1256" y="424" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">María</text>
  </g>

  <!-- Tile (0,1) — AR -->
  <g>
    <rect x="620" y="462" width="284" height="298" rx="20" fill="url(#tile)"/>
    <g clip-path="url(#c3)">
      <circle cx="762" cy="602" r="58" fill="#7B5A3F"/>
      <ellipse cx="762" cy="760" rx="120" ry="80" fill="#7B5A3F"/>
    </g>
    <g>
      <rect x="846" y="480" width="42" height="26" rx="13" fill="#0E1A2B" opacity="0.7"/>
      <text x="867" y="498" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">AR</text>
    </g>
    <rect x="620" y="720" width="284" height="40" fill="#000000" opacity="0.3"/>
    <text x="640" y="746" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">Layla</text>
  </g>

  <!-- Tile (1,1) — JA -->
  <g>
    <rect x="928" y="462" width="284" height="298" rx="20" fill="url(#tile)"/>
    <g clip-path="url(#c4)">
      <circle cx="1070" cy="602" r="58" fill="#D9B894"/>
      <ellipse cx="1070" cy="760" rx="120" ry="80" fill="#D9B894"/>
    </g>
    <g>
      <rect x="1154" y="480" width="42" height="26" rx="13" fill="#0E1A2B" opacity="0.7"/>
      <text x="1175" y="498" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">JA</text>
    </g>
    <rect x="928" y="720" width="284" height="40" fill="#000000" opacity="0.3"/>
    <text x="948" y="746" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">Haru</text>
  </g>

  <!-- Tile (2,1) — SW -->
  <g>
    <rect x="1236" y="462" width="284" height="298" rx="20" fill="url(#tile)"/>
    <g clip-path="url(#c5)">
      <circle cx="1378" cy="602" r="58" fill="#5A3F2A"/>
      <ellipse cx="1378" cy="760" rx="120" ry="80" fill="#5A3F2A"/>
    </g>
    <g>
      <rect x="1462" y="480" width="42" height="26" rx="13" fill="#0E1A2B" opacity="0.7"/>
      <text x="1483" y="498" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">SW</text>
    </g>
    <rect x="1236" y="720" width="284" height="40" fill="#000000" opacity="0.3"/>
    <text x="1256" y="746" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">Amani</text>
  </g>

  <!-- ===== Control bar ===== -->
  <g transform="translate(830, 800)">
    <rect x="0" y="0" width="480" height="64" rx="32" fill="#0E1A2B" stroke="#FFFFFF" stroke-opacity="0.12"/>

    <!-- mic -->
    <g transform="translate(60, 32)">
      <circle r="22" fill="#1F3252"/>
      <rect x="-7" y="-12" width="14" height="20" rx="7" fill="#FFFFFF"/>
      <path d="M -12 2 Q -12 14 0 14 Q 12 14 12 2" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="14" x2="0" y2="20" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- camera -->
    <g transform="translate(140, 32)">
      <circle r="22" fill="#1F3252"/>
      <rect x="-13" y="-9" width="20" height="18" rx="3" fill="#FFFFFF"/>
      <path d="M 7 -3 L 14 -8 L 14 8 L 7 3 Z" fill="#FFFFFF"/>
    </g>

    <!-- screen share -->
    <g transform="translate(220, 32)">
      <circle r="22" fill="#1F3252"/>
      <rect x="-13" y="-11" width="26" height="17" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
      <line x1="-7" y1="11" x2="7" y2="11" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 0 -7 L 0 1 M -4 -3 L 0 -7 L 4 -3" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- raise hand -->
    <g transform="translate(300, 32)">
      <circle r="22" fill="#1F3252"/>
      <path d="M -8 6 L -8 -8 Q -8 -12 -4 -12 Q 0 -12 0 -8 L 0 -10 Q 0 -14 4 -14 Q 8 -14 8 -10 L 8 -6 Q 12 -6 12 -2 L 12 6 Q 12 12 6 12 L -2 12 Q -8 12 -8 6 Z" fill="#FFFFFF"/>
    </g>

    <!-- leave -->
    <g transform="translate(410, 32)">
      <rect x="-32" y="-18" width="64" height="36" rx="18" fill="#E03131"/>
      <g transform="rotate(135)">
        <path d="M -10 -2 Q -10 -10 -2 -10 L 2 -10 Q 10 -10 10 -2 L 10 2 L 6 2 L 6 -2 Q 6 -6 2 -6 L -2 -6 Q -6 -6 -6 -2 L -6 2 L -10 2 Z" fill="#FFFFFF"/>
      </g>
    </g>
  </g>
</svg>
