<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>SSO bootstrap</title>
</head>
<body>
<!--
  Loaded as a hidden iframe by witysk.org subdomains (e.g. meet.witysk.org).
  It can do two things on behalf of the parent:

    1. SSO bootstrap — read this origin's localStorage tokens and post them
       back to the parent so it can sign in without a separate login.

    2. SSO logout — accept a logout request from the parent, call
       /api/auth/logout (server-side session invalidation), clear this
       origin's localStorage, and confirm.

  Allowed parent origins are explicitly listed; we never use postMessage with
  targetOrigin "*". Add new witysk.org subdomains as they appear.
-->
<script>
(function () {
  var ALLOWED_ORIGINS = [
    "https://meet.witysk.org"
    // add more trusted witysk.org subdomains here if needed
  ];

  function read() {
    try {
      return {
        access_token: localStorage.getItem("access_token"),
        refresh_token: localStorage.getItem("refresh_token")
      };
    } catch (e) {
      return { access_token: null, refresh_token: null };
    }
  }

  function clearTokens() {
    try {
      localStorage.removeItem("access_token");
      localStorage.removeItem("refresh_token");
    } catch (e) { /* ignore */ }
  }

  function send(origin, payload) {
    try {
      window.parent.postMessage(
        Object.assign({ type: "witysk-sso" }, payload),
        origin
      );
    } catch (e) {
      // parent may be gone; swallow
    }
  }

  // On load, push current state to every allowed parent (sign-in bootstrap).
  var snapshot = read();
  ALLOWED_ORIGINS.forEach(function (o) { send(o, snapshot); });

  // Respond to runtime messages from a parent.
  window.addEventListener("message", function (ev) {
    if (ALLOWED_ORIGINS.indexOf(ev.origin) === -1) return;
    if (!ev.data || typeof ev.data !== "object") return;

    // Polling: parent asks us to re-send the current localStorage state.
    if (ev.data.type === "witysk-sso-request") {
      send(ev.origin, read());
      return;
    }

    // Logout: parent wants us to invalidate the server-side session AND
    // clear this origin's localStorage. We post back { logout: 'ok' | 'failed' }.
    if (ev.data.type === "witysk-sso-logout") {
      var token;
      try { token = localStorage.getItem("access_token"); } catch (e) { token = null; }

      function reply(ok) {
        clearTokens();
        send(ev.origin, { logout: ok ? "ok" : "failed" });
      }

      if (!token) {
        // Already logged out client-side; nothing to invalidate server-side.
        reply(true);
        return;
      }

      // Same-origin fetch — no CORS gymnastics required.
      fetch("/api/auth/logout", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token },
        credentials: "include",
      }).then(function (r) {
        reply(r.ok || r.status === 401); // 401 = already invalid; same end state.
      }).catch(function () {
        reply(false);
      });
      return;
    }
  });
})();
</script>
</body>
</html>
